services:
  mysql:
    image: mysql:8.0
    container_name: docrev_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: docrev_root
      MYSQL_USER: docrev
      MYSQL_PASSWORD: docrev_secret
    volumes:
      - docrev_mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: docrev_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - docrev_redis_data:/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: docrev_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  docrev_mysql_data:
  docrev_redis_data:
